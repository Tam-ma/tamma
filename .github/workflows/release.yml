name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write  # For creating releases
  id-token: write  # For npm provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Job 1: Publish to npm ──────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify version match
        run: |
          PKG_VERSION=$(node -p "require('./packages/cli/package.json').version")
          if [ "${{ steps.version.outputs.version }}" != "$PKG_VERSION" ]; then
            echo "::error::Tag version (${{ steps.version.outputs.version }}) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version: ${{ steps.version.outputs.version }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r run build

      - name: Typecheck CLI
        run: pnpm --filter @tamma/cli run typecheck

      - name: Run CLI tests
        run: pnpm vitest run packages/cli/src

      - name: Build publish bundle
        run: pnpm --filter @tamma/cli run build:publish

      - name: Run smoke tests
        run: pnpm --filter @tamma/cli run test:smoke

      - name: Verify bundle version
        run: |
          BUNDLE_VERSION=$(node packages/cli/dist/index.js --version 2>/dev/null || true)
          echo "Bundle reports version: $BUNDLE_VERSION"
          if [ "$BUNDLE_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::warning::Bundle version ($BUNDLE_VERSION) may not match tag (${{ steps.version.outputs.version }})"
          fi

      - name: Prepare publish directory
        run: |
          cp packages/cli/package.json.publish packages/cli/package.json
          echo "Package contents:"
          cd packages/cli && npm pack --dry-run 2>&1

      - name: Publish to npm
        working-directory: packages/cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Job 2: Build platform binaries ─────────────────────────────────────────
  build-binaries:
    name: Build ${{ matrix.platform }}
    needs: publish-npm
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-14
          - platform: darwin-x64
            runner: macos-13
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r run build

      - name: Build binary and tar.gz
        run: node packages/cli/scripts/build-binary.mjs --target ${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: packages/cli/dist/binaries/tamma-*
          if-no-files-found: error
          retention-days: 7

  # ── Job 3: Create GitHub Release ───────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [publish-npm, build-binaries]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create combined checksums file
        run: |
          cd artifacts
          cat *.sha256 > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.publish-npm.outputs.version }}
          body: |
            ## Install

            **npm (recommended):**
            ```sh
            npm install -g @tamma/cli@${{ needs.publish-npm.outputs.version }}
            ```

            **macOS / Linux (auto-detects best method):**
            ```sh
            curl -fsSL https://raw.githubusercontent.com/meywd/tamma/main/install.sh | sh
            ```

            **Homebrew:**
            ```sh
            brew install meywd/tap/tamma
            ```

            **Self-update:**
            ```sh
            tamma upgrade
            ```

            ## Checksums

            See `checksums.txt` or individual `.sha256` files for SHA256 checksums.
          files: |
            artifacts/tamma-*
            artifacts/checksums.txt
          fail_on_unmatched_files: true

  # ── Job 4: Verify installations ────────────────────────────────────────────
  verify:
    name: Verify (${{ matrix.method }} on ${{ matrix.os }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            method: npm
          - os: ubuntu-latest
            method: binary
          - os: macos-14
            method: npm
          - os: macos-14
            method: binary
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.method == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify npm install
        if: matrix.method == 'npm'
        run: |
          # Wait for npm propagation
          sleep 30
          npm install -g @tamma/cli@${{ needs.create-release.outputs.version || github.ref_name }}
          INSTALLED_VERSION=$(tamma --version)
          echo "Installed version: $INSTALLED_VERSION"

      - name: Verify binary install
        if: matrix.method == 'binary'
        env:
          TAMMA_VERSION: ${{ needs.create-release.outputs.version || github.ref_name }}
          TAMMA_INSTALL_METHOD: binary
        run: |
          chmod +x install.sh
          ./install.sh
          ~/.local/bin/tamma --version

  # ── Job 5: Update Homebrew tap ─────────────────────────────────────────────
  update-homebrew:
    name: Update Homebrew Formula
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: artifacts

      - name: Generate formula
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          TEMPLATE=$(cat packages/cli/homebrew/tamma.rb.template)
          # Replace version
          FORMULA="${TEMPLATE//\{\{VERSION\}\}/$VERSION}"
          # Replace checksums from .tar.gz.sha256 files
          for platform in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            HASH=$(cut -d' ' -f1 "artifacts/tamma-${VERSION}-${platform}.tar.gz.sha256")
            KEY="SHA256_$(echo "$platform" | tr '[:lower:]-' '[:upper:]_')"
            FORMULA="${FORMULA//\{\{$KEY\}\}/$HASH}"
          done
          echo "$FORMULA" > tamma.rb
          cat tamma.rb

      - name: Push to Homebrew tap
        uses: cpina/github-action-push-to-another-repository@v1.7.2
        env:
          SSH_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        with:
          source-directory: .
          destination-github-username: meywd
          destination-repository-name: homebrew-tap
          target-branch: main
          target-directory: Formula
          commit-message: "tamma ${GITHUB_REF#refs/tags/}"
