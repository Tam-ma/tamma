# =============================================================================
# Deploy to VPS
#
# Syncs repo to VPS, builds Docker images locally, runs migrations.
# Triggers on push to main, PRs to main, or manual dispatch.
#
# Required secrets:
#   VPS_HOST              — Server hostname or IP
#   VPS_USER              — SSH username (e.g., root)
#   VPS_SSH_KEY           — Private SSH key for authentication
#   VPS_DEPLOY_PATH       — Path on VPS (e.g., /opt/tamma)
#   TAMMA_APP_PRIVATE_KEY — GitHub App private key (PEM)
#   TAMMA_DOTENV          — Full .env file contents for docker-compose
#
# Optional secrets:
#   VPS_SSH_PORT          — SSH port (default: 22)
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  SSH_OPTS: -i ~/.ssh/deploy_key -p ${{ secrets.VPS_SSH_PORT || 22 }}
  SSH_TARGET: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
  DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Setup VPS (idempotent)
        run: |
          ssh $SSH_OPTS $SSH_TARGET \
            'if ! command -v docker &>/dev/null; then
               echo "Installing Docker..."
               curl -fsSL https://get.docker.com | sh
             fi
             mkdir -p '"$DEPLOY_PATH"'/{secrets,database/migrations}'

      - name: Write secrets to VPS
        run: |
          echo '${{ secrets.TAMMA_APP_PRIVATE_KEY }}' | \
            ssh $SSH_OPTS $SSH_TARGET \
              "cat > $DEPLOY_PATH/secrets/private-key.pem && chmod 600 $DEPLOY_PATH/secrets/private-key.pem"
          echo '${{ secrets.TAMMA_DOTENV }}' | \
            ssh $SSH_OPTS $SSH_TARGET \
              "cat > $DEPLOY_PATH/.env && chmod 600 $DEPLOY_PATH/.env"

      - name: Sync repo to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.claude' \
            -e "ssh $SSH_OPTS" \
            ./ \
            $SSH_TARGET:$DEPLOY_PATH/repo/

      - name: Build and deploy
        run: |
          ssh $SSH_OPTS $SSH_TARGET "
            cd $DEPLOY_PATH/repo && \
            cp ../. .env 2>/dev/null || true && \
            ln -sf $DEPLOY_PATH/.env $DEPLOY_PATH/repo/.env && \
            docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml build --parallel && \
            docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d --remove-orphans && \
            echo 'Waiting for health checks...' && \
            sleep 15 && \
            docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml ps
          "

      - name: Run database migrations
        run: |
          ssh $SSH_OPTS $SSH_TARGET "
            cd $DEPLOY_PATH/repo && \
            for f in database/migrations/*.sql; do
              echo \"Running migration: \$f\" && \
              docker compose -f docker/docker-compose.yml exec -T postgres \
                psql -U \${POSTGRES_USER:-tamma} -d \${POSTGRES_DB:-tamma} -f /dev/stdin < \"\$f\" 2>&1 || true
            done
          "

      - name: Health check
        run: |
          ssh $SSH_OPTS $SSH_TARGET \
            "curl -sf http://localhost:3100/api/health && echo ' API OK' || echo 'API health check failed'"

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key
